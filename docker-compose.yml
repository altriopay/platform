name: platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - platform_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - path: .env
        required: true
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - path: .env.web
        required: true
    ports:
      - "3001:3001"
    depends_on:
      - server
    restart: unless-stopped
    cap_drop:
      - ALL

volumes:
  platform_postgres_data:
