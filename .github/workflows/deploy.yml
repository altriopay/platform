name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create deploy tarball
        run: |
          tar -czf deploy.tar.gz \
            apps/web/dist \
            apps/server/dist \
            packages \
            turbo.json \
            package.json \
            bun.lock \
            ecosystem.config.js

      - name: Transfer artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy.tar.gz
          target: /opt/altrio/deploy/
          strip_components: 0
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/opt/altrio/deploy"
            APP_DIR="/opt/altrio"

            # Extract new build into app dir
            tar -xzf $DEPLOY_DIR/deploy.tar.gz -C $APP_DIR

            # Install deps and rebuild (in case of native deps)
            cd $APP_DIR
            bun install --frozen-lockfile

            # Restart server with PM2
            pm2 restart altrio-server || pm2 start ecosystem.config.js
