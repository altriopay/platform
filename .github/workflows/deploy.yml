name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create deploy tarball
        run: |
          tar -czf deploy.tar.gz \
            apps/web/dist \
            apps/server/dist \
            packages \
            turbo.json \
            package.json \
            bun.lock

      - name: Transfer artifact to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy.tar.gz
          target: /opt/altrio/deploy/
          strip_components: 0
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/opt/altrio/deploy"
            APP_DIR="/opt/altrio/platform"

            # Stop and remove old containers
            cd $APP_DIR
            docker compose down || true

            # Extract new build into app dir
            tar -xzf $DEPLOY_DIR/deploy.tar.gz -C $APP_DIR

            # Rebuild and start containers (pass .env.web for Vite build-time vars)
            docker compose build --env-file .env.web web
            docker compose up -d
