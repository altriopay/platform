# Lefthook configuration
# https://github.com/evilmartians/lefthook

output:
  - summary
  - meta

pre-commit:
  parallel: true
  commands:
    oxlint:
      glob: "*.{js,ts,jsx,tsx,mjs,mts,cjs,cts}"
      run: bun x oxlint --fix {staged_files}
      stage_fixed: true
    oxfmt:
      glob: "*.{js,ts,jsx,tsx,mjs,mts,cjs,cts,json,yml,yaml,md}"
      run: bun x oxfmt --write {staged_files}
      stage_fixed: true
    typescript-build:
      glob: "*.{js,ts,jsx,tsx,mjs,mts,cjs,cts}"
      run: bun run build
